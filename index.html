<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mahadev Academy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f2027;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100vh;
    }

    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f2027;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<iframe 
  src="https://script.google.com/macros/s/AKfycbz_ZwoJWD_TsxpgSWX-kvnWGnG8vhvWauNligZsU734sOPdjadGg3wUOae3F5Ve_sUFrg/exec"
  onload="document.getElementById('loader').style.display='none'">
</iframe>

</body>
</html>
